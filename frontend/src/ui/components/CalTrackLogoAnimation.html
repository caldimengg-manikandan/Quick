<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalTrack Logo Animation – Premium Reveal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset & Stage ────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #1A56DB;
            --amber: #F59E0B;
            --ink: #0E1116;
            --muted: #6B7280;
            --bg: #F6F8FA;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 20% 50%, rgba(26, 86, 219, .07) 0%, transparent 60%),
                radial-gradient(circle at 80% 50%, rgba(245, 158, 11, .07) 0%, transparent 60%),
                url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='1' fill='rgba(0,0,0,0.05)'/%3E%3C/svg%3E");
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
        }

        /* ── Container ────────────────────────────────────────────── */
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            user-select: none;
        }

        /* ── Main Logo Row ────────────────────────────────────────── */
        .logo-row {
            display: flex;
            align-items: center;
            gap: 0;
            position: relative;
            overflow: visible;
        }

        /* ── CAL wordmark ─────────────────────────────────────────── */
        .word-cal {
            font-family: 'Syne', sans-serif;
            font-size: 68px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--blue);
            line-height: 1;
            /* Animation initial state */
            opacity: 0;
            transform: translateX(-32px);
        }

        /* ── Hourglass icon ───────────────────────────────────────── */
        .hourglass-wrap {
            margin: 0 6px;
            position: relative;
            width: 54px;
            height: 80px;
            flex-shrink: 0;
            opacity: 0;
        }

        .hg-svg {
            width: 54px;
            height: 80px;
            overflow: visible;
        }

        /* ── TRACK wordmark ───────────────────────────────────────── */
        .word-track {
            font-family: 'Syne', sans-serif;
            font-size: 68px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--amber);
            line-height: 1;
            opacity: 0;
            transform: translateX(32px);
        }

        /* ── Amber underline ──────────────────────────────────────── */
        .underline-wrap {
            position: relative;
            height: 6px;
            margin-top: 8px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            opacity: 0;
        }

        .underline-bar {
            flex: 1;
            height: 3px;
            background: linear-gradient(90deg, #F59E0B 0%, #FBBF24 100%);
            border-radius: 99px;
            transform-origin: left center;
            transform: scaleX(0);
        }

        .underline-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--amber);
            flex-shrink: 0;
            opacity: 0;
            transform: scale(0);
        }

        /* ── Tagline row ──────────────────────────────────────────── */
        .tagline-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
            opacity: 0;
            transform: translateY(10px);
        }

        .tag-chip {
            background: rgba(14, 17, 22, 0.07);
            border: 1px solid rgba(14, 17, 22, 0.10);
            border-radius: 999px;
            padding: 4px 14px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--ink);
            text-transform: uppercase;
        }

        .tag-sep {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--muted);
            opacity: 0.5;
        }

        .tag-phrase {
            font-size: 15px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.01em;
        }

        /* ── Replay hint ──────────────────────────────────────────── */
        .replay-btn {
            margin-top: 48px;
            padding: 10px 26px;
            border-radius: 999px;
            border: 1.5px solid rgba(26, 86, 219, 0.25);
            background: rgba(26, 86, 219, 0.06);
            color: var(--blue);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            opacity: 0;
            transition: background .2s, border-color .2s, transform .15s;
        }

        .replay-btn:hover {
            background: rgba(26, 86, 219, 0.12);
            border-color: rgba(26, 86, 219, 0.40);
            transform: translateY(-1px);
        }

        /* ──────────────────────────────────────────────────────────
       ANIMATION KEYFRAMES
    ────────────────────────────────────────────────────────── */

        /* — CAL: slide-in from left, opacity — */
        @keyframes calReveal {
            0% {
                opacity: 0;
                transform: translateX(-40px) skewX(6deg);
            }

            60% {
                opacity: 1;
                transform: translateX(3px) skewX(-1deg);
            }

            100% {
                opacity: 1;
                transform: translateX(0) skewX(0deg);
            }
        }

        /* — TRACK: slide-in from right, opacity — */
        @keyframes trackReveal {
            0% {
                opacity: 0;
                transform: translateX(40px) skewX(-6deg);
            }

            60% {
                opacity: 1;
                transform: translateX(-3px) skewX(1deg);
            }

            100% {
                opacity: 1;
                transform: translateX(0) skewX(0deg);
            }
        }

        /* — Hourglass fade & scale — */
        @keyframes hgAppear {
            0% {
                opacity: 0;
                transform: scale(0.6) rotate(-12deg);
            }

            60% {
                opacity: 1;
                transform: scale(1.06) rotate(4deg);
            }

            80% {
                transform: scale(0.97) rotate(-1deg);
            }

            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        /* — Sand stream drip — */
        @keyframes sandDrip {
            0% {
                transform: scaleY(0);
                opacity: 0;
                transform-origin: top center;
            }

            30% {
                transform: scaleY(1.08);
                opacity: 1;
                transform-origin: top center;
            }

            100% {
                transform: scaleY(1);
                opacity: 1;
                transform-origin: top center;
            }
        }

        /* — Top sand drain — */
        @keyframes sandDrain {
            0% {
                transform: scaleY(1);
                transform-origin: top center;
            }

            100% {
                transform: scaleY(0.12);
                transform-origin: top center;
            }
        }

        /* — Bottom sand pile rise — */
        @keyframes sandRise {
            0% {
                transform: scaleY(0);
                transform-origin: bottom center;
                opacity: 0;
            }

            100% {
                transform: scaleY(1);
                transform-origin: bottom center;
                opacity: 0.9;
            }
        }

        /* — Underline bar expand — */
        @keyframes barExpand {
            0% {
                transform: scaleX(0);
            }

            100% {
                transform: scaleX(1);
            }
        }

        /* — Dot pop — */
        @keyframes dotPop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            60% {
                transform: scale(1.4);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* — Tagline drift up — */
        @keyframes taglineUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* — Underline wrap fade — */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        /* — Replay btn appear — */
        @keyframes replayAppear {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ──────────────────────────────────────────────────────────
       ANIMATION APPLICATION (CSS Classes toggled by JS)
    ────────────────────────────────────────────────────────── */
        .animate .word-cal {
            animation: calReveal 0.65s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        .animate .word-track {
            animation: trackReveal 0.65s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
        }

        .animate .hourglass-wrap {
            animation: hgAppear 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.18s both;
        }

        /* sand drain: top section empties */
        .animate .hg-sand-top {
            animation: sandDrain 1.2s cubic-bezier(0.4, 0, 0.6, 1) 0.65s both;
        }

        /* stream drip */
        .animate .hg-stream {
            animation: sandDrip 0.5s ease-out 1.0s both;
        }

        /* bottom pile rises */
        .animate .hg-sand-bot {
            animation: sandRise 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.05s both;
        }

        /* underline */
        .animate .underline-wrap {
            animation: fadeIn 0.01s linear 1.55s both;
        }

        .animate .underline-bar {
            animation: barExpand 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.55s both;
        }

        .animate .underline-dot {
            animation: dotPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 2.0s both;
        }

        /* tagline */
        .animate .tagline-row {
            animation: taglineUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) 2.1s both;
        }

        /* replay */
        .animate .replay-btn {
            animation: replayAppear 0.4s ease-out 3.4s both;
        }

        /* ── Dark mode variant (optional) ───────────────────────── */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0B1629;
                --ink: #F6F8FA;
                --muted: #9CA3AF;
            }

            .tag-chip {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.10);
            }
        }
    </style>
</head>

<body>
    <div class="stage" id="stage">
        <!-- Main wordmark row -->
        <div class="logo-row">
            <span class="word-cal">CAL</span>

            <!-- Hourglass icon -->
            <span class="hourglass-wrap" aria-hidden="true">
                <svg class="hg-svg" viewBox="0 0 54 80" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <clipPath id="ctTopClip">
                            <rect x="9" y="4" width="36" height="34" rx="2" />
                        </clipPath>
                        <clipPath id="ctBotClip">
                            <rect x="9" y="42" width="36" height="34" rx="2" />
                        </clipPath>
                    </defs>

                    <!-- Outline: top bulb (blue) -->
                    <path d="M8 4 L46 4 L46 6 Q46 36 27 40 Q8 36 8 6 Z" fill="none" stroke="#1A56DB" stroke-width="2.5"
                        stroke-linejoin="round" />

                    <!-- Outline: bottom bulb (amber) -->
                    <path d="M8 76 L46 76 L46 74 Q46 44 27 40 Q8 44 8 74 Z" fill="none" stroke="#F59E0B"
                        stroke-width="2.5" stroke-linejoin="round" />

                    <!-- Top cap bar (blue) -->
                    <rect x="6" y="2" width="42" height="5" rx="2.5" fill="#1A56DB" />

                    <!-- Bottom cap bar (amber) -->
                    <rect x="6" y="73" width="42" height="5" rx="2.5" fill="#F59E0B" />

                    <!-- Top sand (drains during animation) -->
                    <g clip-path="url(#ctTopClip)">
                        <rect class="hg-sand-top" x="9" y="4" width="36" height="34" fill="#F59E0B" opacity="0.85"
                            rx="2" />
                    </g>

                    <!-- Sand stream drip -->
                    <rect class="hg-stream" x="25" y="38" width="4" height="7" fill="#F59E0B" rx="2" />

                    <!-- Bottom sand pile (rises during animation) -->
                    <g clip-path="url(#ctBotClip)">
                        <ellipse class="hg-sand-bot" cx="27" cy="76" rx="10" ry="5" fill="#F59E0B" opacity="0.9" />
                    </g>
                </svg>
            </span>

            <span class="word-track">TRACK</span>
        </div>

        <!-- Amber underline + dot -->
        <div class="underline-wrap">
            <div class="underline-bar"></div>
            <div class="underline-dot"></div>
        </div>

        <!-- Tagline -->
        <div class="tagline-row">
            <span class="tag-chip">CHRONOFLOW</span>
            <span class="tag-sep"></span>
            <span class="tag-phrase">Workforce Time Suite</span>
        </div>

        <!-- Replay -->
        <button class="replay-btn" id="replayBtn" type="button">↺ Replay Animation</button>
    </div>

    <script>
        const stage = document.getElementById("stage")
        const replayBtn = document.getElementById("replayBtn")

        function play() {
            // Reset by removing class, forcing reflow, then re-adding
            stage.classList.remove("animate")
            void stage.offsetWidth               // force reflow
            stage.classList.add("animate")
        }

        replayBtn.addEventListener("click", play)
        play()   // auto-play on load
    </script>
</body>

</html>
